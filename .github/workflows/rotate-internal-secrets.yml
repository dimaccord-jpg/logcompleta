name: Rotate Internal Secrets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"

jobs:
  rotate-preview:
    name: Rotation Preview (Internal)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run dry-run rotation for internal keys
        run: |
          python scripts/security/rotate_secrets.py \
            --env-file app/.env.example \
            --auto-only \
            --dry-run \
            --report-file scripts/security/rotation-report-ci.json

      - name: Upload rotation preview report
        uses: actions/upload-artifact@v4
        with:
          name: rotation-report-ci
          path: scripts/security/rotation-report-ci.json

      - name: Notify webhook (optional)
        if: always() && secrets.ROTATION_NOTIFY_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.ROTATION_NOTIFY_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          PAYLOAD=$(cat <<'JSON'
          {
            "text": "Rotate Internal Secrets workflow finalizado com status: __STATUS__"
          }
          JSON
          )
          PAYLOAD="${PAYLOAD/__STATUS__/$STATUS}"
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
