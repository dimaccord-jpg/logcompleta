{% extends "base_admin.html" %}

{% block admin_content %}
<div class="container-fluid">
    <h4 class="mb-4">Painel de Controle</h4>
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3">
                <small class="text-muted fw-bold">📡 STATUS API</small>
                <h3 class="{{ 'text-success' if status.api_indices == 'Online' else 'text-danger' }} mb-0">
                    {{ status.api_indices }}
                </h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3">
                <small class="text-muted fw-bold">🗄️ DATABASE</small>
                <h3 class="text-primary mb-0">{{ status.db_localidades }}</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3">
                <small class="text-muted fw-bold">🛠️ SISTEMA</small>
                <h3 class="text-dark mb-0">{{ status.status_geral }}</h3>
            </div>
        </div>
    </div>
    <div class="alert alert-info mt-4">
        {{ status.mensagem_sistema }}
    </div>
</div>
{% endblock %}
