{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh;">
    <div class="card af-login-card" style="max-width: 500px;">
        <div class="p-5 af-login-form">
            
            <div class="text-center mb-4">
                <h4 class="fw-bold">Finalize seu Perfil</h4>
                <p class="small" style="color: var(--af-text-muted);">
                    Precisamos de algumas informações adicionais para personalizar sua experiência.
                </p>
            </div>

            <form method="POST" action="{{ url_for('complete_profile') }}">
                
                <!-- Cargo -->
                <div class="mb-3">
                    <label class="form-label small fw-bold">Cargo</label>
                    <select name="job_role" class="form-select" required>
                        <option value="" selected disabled>Selecione seu cargo</option>
                        <option value="analista">Analista</option>
                        <option value="coordenador">Coordenador</option>
                        <option value="gerente">Gerente</option>
                        <option value="diretor">Diretor</option>
                        <option value="proprietario">Proprietário / Sócio</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>

                <!-- Objetivo de Uso -->
                <div class="mb-3">
                    <label class="form-label small fw-bold d-block">Objetivo de Uso</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="usage_purpose" id="uso-trabalho" value="trabalho" required>
                        <label class="form-check-label small" for="uso-trabalho">Trabalho / Empresa</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="usage_purpose" id="uso-pessoal" value="pessoal">
                        <label class="form-check-label small" for="uso-pessoal">Uso pessoal</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="usage_purpose" id="uso-estudo" value="estudo">
                        <label class="form-check-label small" for="uso-estudo">Estudos / Pesquisa</label>
                    </div>
                </div>

                <!-- Newsletter -->
                <div class="mb-3 form-check">
                    <input class="form-check-input" type="checkbox" value="1" id="newsletter" name="subscribes_to_newsletter">
                    <label class="form-check-label small" for="newsletter">
                        Desejo receber novidades, conteúdos e atualizações por e-mail.
                    </label>
                </div>

                <!-- Termo de Uso -->
                <div class="mb-4 form-check">
                    <input class="form-check-input" type="checkbox" value="1" id="accept_terms" name="accept_terms" required>
                    <label class="form-check-label small" for="accept_terms">
                        Li e aceito os
                        {% if active_term and active_term.filename %}
                        <a href="{{ url_for('static', filename='terms/' + active_term.filename) }}" target="_blank" rel="noopener noreferrer">Termos de Uso</a>.
                        {% else %}
                        Termos de Uso.
                        {% endif %}
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow">
                    Continuar para o Painel
                </button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
