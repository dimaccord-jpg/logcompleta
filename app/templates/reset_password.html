{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh;">
    <div class="card shadow-lg" style="max-width: 480px; width: 100%;">
        <div class="card-body p-4 p-md-5">
            <h4 class="fw-bold mb-3 text-center">Criar nova senha</h4>
            <p class="small text-muted mb-4 text-center">
                Defina uma nova senha para acessar sua conta.
            </p>
            <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nova senha</label>
                    <input type="password" name="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Confirme a nova senha</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Repita a senha" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">
                    Salvar nova senha
                </button>
            </form>
            <div class="mt-3 text-center">
                <a href="{{ url_for('login') }}" class="small">Voltar para login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
