<div class="card ri-card border-0 shadow-sm mb-4">
    <div class="card-header fw-bold pt-3">
        <i class="bi bi-journal-text me-1"></i> Artigos da Júlia
    </div>
    <div class="list-group list-group-flush">
        {% for artigo in artigos %}
        <a href="{{ url_for('detalhe_noticia', noticia_id=artigo.id) }}" class="list-group-item list-group-item-action py-3">
            <div class="d-flex w-100 justify-content-between">
                <h6 class="mb-1 fw-bold text-primary">{{ artigo.titulo_julia }}</h6>
                <small class="text-muted">{{ artigo.data_publicacao.strftime('%d/%m') }}</small>
            </div>
            <p class="mb-1 small text-muted text-truncate">{{ artigo.subtitulo }}</p>
        </a>
        {% else %}
        <div class="p-3 text-center text-muted small">
            Nenhum artigo estratégico disponível no momento.
        </div>
        {% endfor %}
    </div>
</div>
